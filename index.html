<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Assitência SPTech</title>

    <script defer src="./main.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <h1 class="title">TermoTech</h1>
        <div class="header-actions">
            <div class="header-item">
                <p>Progresso: <span id="quiz-progress">0/0</span></p>
                <p>| Acertos: <span id="quiz-acertos">0</span> | Erros: <span id="quiz-erros">0</span></p>
                <button onclick="resetGame()" class="btn-reset-game"><i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
            <div class="header-item">
                <label for="ipt-dificulty">Dificuldade</label>
                <select id="ipt-dificulty">
                    <option value="easy">Fácil</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Difícil</option>
                    <option value="alan-turing">Alan Turing</option>
                </select>
            </div>
        </div>
    </header>
    <main>
        <div id="termo"></div>
        <div id="keyboard"></div>
    </main>
    <footer>
        <a href="http://github.com/arthurr-rosante" target="_blank">Por: <span><i class="fa-brands fa-github"></i> Arthurr-Rosante</span> | 1CCOB 2026.1</p>
    </footer>
    
<script>
    const dificultyToNumTries = {
        "easy": 8,
        "normal": 6,
        "hard": 3,
        "alan-turing": 1
    };

    
    let currentTrie = 1;
    let questionsToShow;
    let currentQuestion;
    let qtdAcertos = 0;
    let qtdErros = 0;
    
    document.addEventListener("DOMContentLoaded", () => {
        questionsToShow = [...questions];
        startGame();
    });

    // Ouvinte de Digitação
    document.addEventListener("keydown", (ev) => {
        if (ev.ctrlKey || ev.altKey || ev.metaKey) return;

        const cellEl = document.querySelector(`.cell--selected`);
        if(!cellEl) return;
        const cellPos = Number(cellEl.dataset.cellPosition);

        if(ev.key === "Backspace") {
            backspaceAction(ev);
        } else if (ev.key === "Enter") {
            enterAction(ev, currentQuestion.answer);
        } else if (allowedCharacters.includes(ev.key.toUpperCase())) {
            typeAction(ev);
        } 
    });

    // Ouvinte de Mudança de Dificuldade
    document.getElementById("ipt-dificulty").addEventListener("change", (e) => {
        const dificulty = e.target.value || "normal";
        const numTries =  dificultyToNumTries[dificulty];
        currentTrie = 1;

        generateTermo(currentQuestion, numTries);
    });
</script>
</body>
</html>
