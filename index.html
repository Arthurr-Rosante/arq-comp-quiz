<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Assitência SPTech</title>

    <script defer src="./main.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <h1 class="title">TermoTech</h1>
        <div>
            <label for="ipt-dificulty">Dificuldade</label>
            <select id="ipt-dificulty">
                <option value="easy">Fácil</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Difícil</option>
                <option value="alan-turing">Alan Turing</option>
            </select>
        </div>
    </header>
    <main>
        <div id="termo"></div>
        <div id="keyboard"></div>
    </main>
    <footer>
        <a href="http://github.com/arthurr-rosante" target="_blank">Por: <span><i class="fa-brands fa-github"></i> Arthurr-Rosante</span> | 1CCOB 2026.1</p>
    </footer>
    
<script>
    const dificultyToNumTries = {
        "easy": 8,
        "normal": 6,
        "hard": 3,
        "alan-turing": 1
    };

    let currentQuestion;
    let currentTrie = 1;
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Aleatoriza Primeira Questão
        const questionId = Math.floor(Math.random() * questions.length);
        currentQuestion = questions[questionId];

        // 2. Gera GRID do Termo
        const dificulty = document.getElementById("ipt-dificulty")?.value || "normal";
        const numTries =  dificultyToNumTries[dificulty];
        
        generateTermo(currentQuestion, numTries);
        generateKeyboard(currentQuestion.answer);
    });

    // Ouvinte de Digitação
    document.addEventListener("keydown", (ev) => {
        if (ev.ctrlKey || ev.altKey || ev.metaKey) return;

        const cellEl = document.querySelector(`.cell--selected`);
        if(!cellEl) return;
        const cellPos = Number(cellEl.dataset.cellPosition);

        if(ev.key === "Backspace") {
            backspaceAction(ev);
        } else if (ev.key === "Enter") {
            enterAction(ev);
        } else if (allowedCharacters.includes(ev.key.toUpperCase())) {
            typeAction(ev);
        } 
    });
    
    // Ouvinte de Mudança de Dificuldade
    document.getElementById("ipt-dificulty").addEventListener("change", (e) => {
        const dificulty = e.target.value || "normal";
        const numTries =  dificultyToNumTries[dificulty];
        generateTermo(currentQuestion, numTries);
    });
</script>
</body>
</html>
